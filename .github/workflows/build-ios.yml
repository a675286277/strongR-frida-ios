name: Build strongR-frida iOS

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version to build (e.g. 17.7.3)'
        required: true
        default: '17.7.3'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup environment
        run: |
          python3 --version
          pip3 install lief
          brew install vala
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path
          xcodebuild -version

      - name: Clone Frida and Florida patches
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          FRIDA_VERSION=${{ github.event.inputs.frida_version }}
          echo "Building Frida $FRIDA_VERSION for iOS arm64"
          
          git clone --recurse-submodules https://github.com/frida/frida.git
          cd frida
          git checkout $FRIDA_VERSION
          git submodule update --init --recursive
          cd ..
          git clone https://github.com/Ylarod/Florida.git
          cd Florida
          git checkout $FRIDA_VERSION 2>/dev/null || echo "Florida $FRIDA_VERSION tag not found, using HEAD"
          cd ..
          
          echo "Frida cloned, applying Florida patches..."

      - name: Apply Florida patches
        run: |
          cd frida
          for path in ../Florida/patches/*; do
            name=$(basename $path)
            if [ -d "subprojects/$name" ]; then
              echo "Applying patches to frida/subprojects/$name"
              cd subprojects/$name
              git am ../../../Florida/patches/$name/*.patch || {
                echo "git am failed for $name, trying git apply..."
                for p in ../../../Florida/patches/$name/*.patch; do
                  git apply "$p" || echo "Warning: $(basename $p) failed"
                done
              }
              cd ../..
            else
              echo "Skipping $name - subproject not found"
            fi
          done
          echo "All patches applied."

      - name: Build frida for iOS arm64
        run: |
          export IOS_CERTID=-
          mkdir build-ios-arm64
          cd build-ios-arm64
          ../frida/configure --host=ios-arm64e
          make
          echo "=== Build completed ==="

      - name: Collect and upload artifacts
        run: |
          mkdir -p output
          FRIDA_VERSION=${{ github.event.inputs.frida_version }}
          
          SERVER="build-ios-arm64/subprojects/frida-core/server/frida-server"
          INJECT="build-ios-arm64/subprojects/frida-core/inject/frida-inject"
          GADGET="build-ios-arm64/subprojects/frida-core/lib/gadget/frida-gadget.dylib"
          AGENT="build-ios-arm64/subprojects/frida-core/lib/agent/frida-agent.dylib"
          
          [ -f "$SERVER" ] && cp "$SERVER" "output/frida-server-${FRIDA_VERSION}-ios-arm64" && echo "Found server"
          [ -f "$INJECT" ] && cp "$INJECT" "output/frida-inject-${FRIDA_VERSION}-ios-arm64" && echo "Found inject"
          [ -f "$GADGET" ] && cp "$GADGET" "output/frida-gadget-${FRIDA_VERSION}-ios-arm64.dylib" && echo "Found gadget"
          [ -f "$AGENT" ] && cp "$AGENT" "output/frida-agent-${FRIDA_VERSION}-ios-arm64.dylib" && echo "Found agent"
          
          if [ -z "$(ls -A output 2>/dev/null)" ]; then
            echo "Standard paths empty, searching..."
            find build-ios-arm64 -type f \( -name 'frida-server' -o -name 'frida-inject' -o -name 'frida-gadget*' \) 2>/dev/null | while read f; do
              echo "Found: $f"
              cp "$f" output/
            done
          fi
          
          ls -la output/
          if [ -z "$(ls -A output 2>/dev/null)" ]; then
            echo "ERROR: No artifacts!"
            find build-ios-arm64 -type f 2>/dev/null | grep -v __pycache__ | head -50
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strongR-frida-ios-arm64-${{ github.event.inputs.frida_version }}
          path: output/
          retention-days: 30
